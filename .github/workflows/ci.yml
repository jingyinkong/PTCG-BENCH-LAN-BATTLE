name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -e .

      - name: Lint (ruff)
        run: ruff check ptcg/core/ops tests/core/test_ops_zone_service.py tests/core/test_operation_executor.py tests/core/test_operation_resolver.py tests/core/test_semantic_reducer_bridge.py tests/core/test_semantic_ops_fake_integration.py

      - name: Test (pytest)
        run: pytest tests/ -v

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit
